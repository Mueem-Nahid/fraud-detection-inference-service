groups:
  - name: modelserve-api
    rules:
      - alert: HighPredictionLatency
        expr: histogram_quantile(0.95, rate(prediction_duration_seconds_bucket[5m])) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High p95 prediction latency"
          description: "The ModelServe API p95 prediction latency has exceeded 1 second for 5 minutes."

      - alert: ElevatedPredictionErrorRate
        expr: rate(prediction_errors_total[2m]) / clamp_min(rate(prediction_requests_total[2m]), 0.001) > 0.05
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Elevated prediction error rate"
          description: "More than 5% of prediction requests are failing over the last 2 minutes."

      - alert: ModelServeApiDown
        expr: up{job="modelserve-api"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "ModelServe API is down"
          description: "Prometheus cannot scrape the FastAPI /metrics endpoint."
